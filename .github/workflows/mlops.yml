name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - "data/**.dvc"
      - "src/**.py"
      - "params.yaml"
      - ".github/workflows/mlops.yml"
  workflow_dispatch:

jobs:
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
      candidate_prefix: ${{ steps.candidate.outputs.candidate_prefix }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to AWS
        run: |
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}"
          export CLOUD_BUCKET="${{ secrets.CLOUD_BUCKET }}"
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION" >> "$GITHUB_ENV"
          echo "CLOUD_BUCKET=$CLOUD_BUCKET" >> "$GITHUB_ENV"
          python - <<'EOF'
          import boto3
          ident = boto3.client("sts").get_caller_identity()
          print(f"Authenticated as {ident['Arn']}")
          EOF

      - name: Configure optional MLflow tracking
        env:
          DAGSHUB_MLFLOW_URI: https://dagshub.com/diepnbno1/Day21-Track2-CI-CD-for-AI-Systems-2A202600535-NGUYEN-BACH-DIEP.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          if [ -n "$MLFLOW_TRACKING_USERNAME" ] && [ -n "$MLFLOW_TRACKING_PASSWORD" ]; then
            echo "MLFLOW_TRACKING_URI=$DAGSHUB_MLFLOW_URI" >> "$GITHUB_ENV"
            echo "MLflow remote tracking is enabled."
          else
            echo "MLflow remote tracking is not configured; using local sqlite tracking."
          fi
          if [ -n "$MLFLOW_TRACKING_USERNAME" ]; then
            echo "MLFLOW_TRACKING_USERNAME=$MLFLOW_TRACKING_USERNAME" >> "$GITHUB_ENV"
          fi
          if [ -n "$MLFLOW_TRACKING_PASSWORD" ]; then
            echo "MLFLOW_TRACKING_PASSWORD=$MLFLOW_TRACKING_PASSWORD" >> "$GITHUB_ENV"
          fi

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> "$GITHUB_OUTPUT"
          echo "Accuracy: $ACC"

      - name: Set candidate prefix
        id: candidate
        run: |
          CANDIDATE_PREFIX="models/candidates/${GITHUB_SHA}"
          echo "candidate_prefix=$CANDIDATE_PREFIX" >> "$GITHUB_OUTPUT"
          echo "Candidate prefix: $CANDIDATE_PREFIX"

      - name: Upload candidate artifacts to S3
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket = os.environ["CLOUD_BUCKET"]
          prefix = os.environ["CANDIDATE_PREFIX"].rstrip("/")
          uploads = {
              "models/model.pkl": f"{prefix}/model.pkl",
              "outputs/metrics.json": f"{prefix}/metrics.json",
              "outputs/report.txt": f"{prefix}/report.txt",
          }
          client = boto3.client("s3")
          for local_path, key in uploads.items():
              client.upload_file(local_path, bucket, key)
              print(f"Uploaded {local_path} to s3://{bucket}/{key}")
          EOF
        env:
          CANDIDATE_PREFIX: ${{ steps.candidate.outputs.candidate_prefix }}

      - name: Save metrics and report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-and-report
          path: |
            outputs/metrics.json
            outputs/report.txt

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install AWS dependency
        run: python -m pip install boto3==1.43.0

      - name: Authenticate to AWS
        run: |
          export AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
          export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          export AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}"
          export CLOUD_BUCKET="${{ secrets.CLOUD_BUCKET }}"
          echo "AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION" >> "$GITHUB_ENV"
          echo "CLOUD_BUCKET=$CLOUD_BUCKET" >> "$GITHUB_ENV"
          python - <<'EOF'
          import boto3
          ident = boto3.client("sts").get_caller_identity()
          print(f"Authenticated as {ident['Arn']}")
          EOF

      - name: Check eval and rollback gates
        run: |
          python - <<'EOF'
          import json
          import os

          import boto3
          import botocore.exceptions

          bucket = os.environ["CLOUD_BUCKET"]
          candidate_prefix = os.environ["CANDIDATE_PREFIX"].rstrip("/")
          new_acc = float(os.environ["NEW_ACCURACY"])
          threshold = 0.70
          client = boto3.client("s3")

          if new_acc < threshold:
              raise SystemExit(
                  f"FAILED: accuracy {new_acc:.4f} < {threshold:.2f}. Cancel deploy."
              )
          print(f"PASSED: accuracy {new_acc:.4f} >= {threshold:.2f}.")

          previous = None
          try:
              response = client.get_object(Bucket=bucket, Key="models/latest/metrics.json")
              previous = json.loads(response["Body"].read())
          except botocore.exceptions.ClientError as exc:
              code = exc.response.get("Error", {}).get("Code")
              if code not in {"NoSuchKey", "404"}:
                  raise
              print("No previous metrics found; treating this as the first promoted model.")

          if previous:
              old_acc = float(previous.get("accuracy", 0.0))
              print(f"Previous deployed accuracy: {old_acc:.4f}")
              if new_acc < old_acc:
                  raise SystemExit(
                      f"FAILED: new accuracy {new_acc:.4f} < current accuracy {old_acc:.4f}. "
                      "Keep the previous model deployed."
                  )
              print(f"PASSED: new accuracy {new_acc:.4f} >= current accuracy {old_acc:.4f}.")

          for filename in ("model.pkl", "metrics.json", "report.txt"):
              source_key = f"{candidate_prefix}/{filename}"
              target_key = f"models/latest/{filename}"
              client.copy_object(
                  Bucket=bucket,
                  CopySource={"Bucket": bucket, "Key": source_key},
                  Key=target_key,
              )
              print(f"Promoted s3://{bucket}/{source_key} to s3://{bucket}/{target_key}")
          EOF
        env:
          CANDIDATE_PREFIX: ${{ needs.train.outputs.candidate_prefix }}
          NEW_ACCURACY: ${{ needs.train.outputs.accuracy }}

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              sleep 3
            done
            sudo journalctl -u mlops-serve -n 80 --no-pager
            exit 1
